name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow に必要な最小権限のみ付与 (デフォルトの read/write を上書き)
# CI は何も書き込まないので contents: read のみで十分。
permissions:
  contents: read

# 同じ PR への新しい push が来たら古いジョブをキャンセルする (CI 時間節約)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # 後続ステップへ git credentials を漏らさない
          persist-credentials: false

      - name: Setup pnpm
        # version は package.json の packageManager フィールドから読まれる
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # pnpm 10.33+ は node:sqlite を使うため Node.js v22.13+ が必須 (20 だと起動失敗)
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
