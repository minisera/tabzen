name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Workflow に必要な最小権限のみ付与 (デフォルトの read/write を上書き)
# CI は何も書き込まないので contents: read のみで十分。
permissions:
  contents: read

# 同じ PR への新しい push が来たら古いジョブをキャンセルする (CI 時間節約)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint / Typecheck / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # 後続ステップへ git credentials を漏らさない
          persist-credentials: false

      - name: Setup pnpm
        # version は package.json の packageManager フィールドから読まれる
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          # pnpm 10.33+ は node:sqlite を使うため Node.js v22.13+ が必須 (20 だと起動失敗)
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
