name: Release

on:
  push:
    tags:
      - 'v*'

# top-level は最小権限。Release 作成に必要な書き込み権限は job 内で付与する。
permissions: read-all

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      # GitHub Release 作成に必要 (softprops/action-gh-release)
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # 後続ステップへ git credentials を漏らさない
          # (Release 作成は softprops/action-gh-release が GITHUB_TOKEN env を直接読むので、git credentials は不要)
          persist-credentials: false

      - name: Setup pnpm
        # version は package.json の packageManager フィールドから読まれる
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # pnpm 10.33+ は node:sqlite を使うため Node.js v22.13+ が必須 (20 だと起動失敗)
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint / Typecheck / Test
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test

      - name: Build
        run: pnpm build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version OK: $PKG_VERSION"

      - name: Package extension zip
        run: |
          cd dist
          zip -r "../tabzen-${GITHUB_REF_NAME}.zip" .
          cd ..
          ls -la "tabzen-${GITHUB_REF_NAME}.zip"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section between "## [<version>]" and the next "## [" header
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG entry found for $VERSION — falling back to tag name." >&2
            echo "Tab Zen $GITHUB_REF_NAME" > release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: tabzen-${{ github.ref_name }}.zip
          draft: false
          prerelease: false
