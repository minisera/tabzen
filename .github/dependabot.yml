# Dependabot 設定 (https://docs.github.com/code-security/dependabot)
# - npm (pnpm) と GitHub Actions の依存を週次でチェック
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '07:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'
    groups:
      # patch/minor をまとめて分割 PR を防ぐ。auto-merge が一括で通り、
      # codeql-action の init/analyze 不整合のような部分更新も起きなくなる。
      # major は group 対象外 = 個別 PR (手動レビュー) のまま。
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '07:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'ci'
      include: 'scope'
    groups:
      # patch/minor をまとめて分割 PR を防ぐ。auto-merge が一括で通り、
      # codeql-action の init/analyze 不整合のような部分更新も起きなくなる。
      # major は group 対象外 = 個別 PR (手動レビュー) のまま。
      minor-and-patch:
        applies-to: version-updates
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
