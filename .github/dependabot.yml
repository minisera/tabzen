# Dependabot 設定 (https://docs.github.com/code-security/dependabot)
# - npm (pnpm) と GitHub Actions の依存を週次でチェック
version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '07:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore'
      include: 'scope'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'tuesday'
      time: '07:00'
      timezone: 'Asia/Tokyo'
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
    commit-message:
      prefix: 'ci'
      include: 'scope'
